<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>氣象預報測試</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        * { box-sizing: border-box; }
        body { 
            margin: 0; 
            background: #0a0e27;
            min-height: 100vh;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            position: relative;
            overflow-x: hidden;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 30%, rgba(0, 174, 255, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(138, 43, 226, 0.15) 0%, transparent 50%);
            pointer-events: none;
        }
        .grid-bg {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                linear-gradient(rgba(0, 174, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 174, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            animation: gridMove 20s linear infinite;
        }
        @keyframes gridMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }
        .weather-container { 
            max-width: 1200px; 
            margin: 0 auto; 
            padding: 40px 20px; 
            position: relative;
            z-index: 1;
        }
        h1 {
            color: #fff;
            text-align: center;
            font-size: 3rem;
            margin: 0 0 8px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(135deg, #00aeff 0%, #8a2be2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: fadeInDown 0.6s ease;
            position: relative;
        }
        h1::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 3px;
            background: linear-gradient(90deg, transparent, #00aeff, #8a2be2, transparent);
            box-shadow: 0 0 10px rgba(0, 174, 255, 0.8);
        }
        h1 + p {
            text-align: center;
            color: rgba(255,255,255,0.7);
            margin-bottom: 40px;
            font-size: 1rem;
            font-weight: 400;
            letter-spacing: 1px;
        }
        .weather-form { 
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 174, 255, 0.2);
            border-radius: 16px;
            padding: 32px;
            box-shadow: 
                0 0 40px rgba(0, 174, 255, 0.1),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 24px; 
            margin-bottom: 32px;
            animation: fadeInUp 0.6s ease 0.2s backwards;
            position: relative;
        }
        .weather-form::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(0, 174, 255, 0.5), transparent);
        }
        .weather-form > div {
            display: flex;
            flex-direction: column;
        }
        .weather-form label { 
            font-weight: 600; 
            color: #00aeff;
            margin-bottom: 8px;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }
        .weather-form input { 
            padding: 12px 16px; 
            border: 1px solid rgba(0, 174, 255, 0.3); 
            border-radius: 8px; 
            background: rgba(10, 14, 39, 0.6);
            font-size: 14px;
            transition: all 0.3s ease;
            color: #fff;
            font-weight: 400;
        }
        .weather-form input:focus {
            outline: none;
            border-color: #00aeff;
            background: rgba(10, 14, 39, 0.9);
            box-shadow: 0 0 20px rgba(0, 174, 255, 0.3);
        }
        .weather-form button { 
            grid-column: 1 / -1; 
            padding: 16px 32px; 
            border: 1px solid #00aeff; 
            background: linear-gradient(135deg, rgba(0, 174, 255, 0.2) 0%, rgba(138, 43, 226, 0.2) 100%);
            color: #fff; 
            border-radius: 12px; 
            cursor: pointer; 
            font-size: 15px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(0, 174, 255, 0.3);
            position: relative;
            overflow: hidden;
            margin-top: 8px;
        }
        .weather-form button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(0, 174, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }
        .weather-form button:hover::before {
            width: 300px;
            height: 300px;
        }
        .weather-form button:hover {
            border-color: #00aeff;
            box-shadow: 0 0 30px rgba(0, 174, 255, 0.5);
        }
        .weather-form button:disabled { 
            opacity: 0.4; 
            cursor: not-allowed;
        }
        .status { 
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            padding: 16px 24px;
            border-radius: 8px;
            margin-bottom: 24px;
            font-weight: 600;
            text-align: center;
            box-shadow: 0 0 30px rgba(0, 174, 255, 0.2);
            animation: fadeIn 0.4s ease;
            color: #00aeff;
            font-size: 0.9rem;
            border: 1px solid rgba(0, 174, 255, 0.3);
            letter-spacing: 1px;
        }
        .results { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 24px; 
        }
        .location-card { 
            border: 1px solid rgba(0, 174, 255, 0.2);
            border-radius: 16px; 
            padding: 28px; 
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            box-shadow: 
                0 0 40px rgba(0, 174, 255, 0.1),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
            transition: all 0.4s ease;
            animation: slideIn 0.5s ease backwards;
            position: relative;
            overflow: hidden;
        }
        .location-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 174, 255, 0.1), transparent);
            transition: left 0.6s;
        }
        .location-card:hover::before {
            left: 100%;
        }
        .location-card:nth-child(1) { animation-delay: 0.1s; }
        .location-card:nth-child(2) { animation-delay: 0.2s; }
        .location-card:nth-child(3) { animation-delay: 0.3s; }
        .location-card:nth-child(4) { animation-delay: 0.4s; }
        .location-card:hover {
            border-color: #00aeff;
            box-shadow: 0 0 50px rgba(0, 174, 255, 0.3);
            transform: translateY(-4px);
        }
        .location-card h2 { 
            margin: 0 0 24px; 
            background: linear-gradient(135deg, #00aeff 0%, #8a2be2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 1.8rem;
            border-bottom: 2px solid rgba(0, 174, 255, 0.3);
            padding-bottom: 12px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .element-block { 
            margin-bottom: 20px; 
            padding: 16px;
            background: rgba(10, 14, 39, 0.4);
            border-radius: 12px;
            border: 1px solid rgba(0, 174, 255, 0.15);
            transition: all 0.3s ease;
        }
        .element-block:hover {
            background: rgba(10, 14, 39, 0.6);
            border-color: rgba(0, 174, 255, 0.4);
        }
        .element-block h3 { 
            margin: 0 0 12px; 
            font-size: 1rem; 
            color: #00aeff;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .element-block h3::before {
            content: '▸';
            font-size: 1.2rem;
            color: #8a2be2;
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .time-entry { 
            padding: 12px 16px; 
            border-left: 3px solid #00aeff;
            background: rgba(0, 174, 255, 0.05);
            margin-bottom: 10px; 
            border-radius: 6px;
            transition: all 0.3s ease;
            white-space: pre-line;
            color: rgba(255, 255, 255, 0.9);
            font-weight: 400;
            font-size: 0.9rem;
            line-height: 1.6;
            box-shadow: 0 0 10px rgba(0, 174, 255, 0.1);
        }
        .time-entry:hover {
            border-left-width: 5px;
            background: rgba(0, 174, 255, 0.1);
            box-shadow: 0 0 20px rgba(0, 174, 255, 0.2);
            transform: translateX(4px);
        }
        .time-entry:last-child { margin-bottom: 0; }
        .raw-json { 
            margin-top: 36px;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            border-radius: 16px;
            padding: 28px;
            box-shadow: 0 0 40px rgba(0, 174, 255, 0.1);
            animation: fadeInUp 0.6s ease 0.4s backwards;
            border: 1px solid rgba(0, 174, 255, 0.2);
        }
        .raw-json h2 {
            margin: 0 0 16px;
            background: linear-gradient(135deg, #00aeff 0%, #8a2be2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .raw-json h2::before {
            content: '{ }';
            font-size: 1.2rem;
            color: #00aeff;
        }
        pre { 
            background: rgba(10, 14, 39, 0.8);
            color: #00ff88; 
            padding: 20px; 
            border-radius: 12px; 
            overflow-x: auto;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.5);
            font-size: 13px;
            line-height: 1.7;
            font-family: 'Fira Code', 'Consolas', 'Monaco', monospace;
            border: 1px solid rgba(0, 174, 255, 0.2);
        }
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-30px); }
            to { opacity: 1; transform: translateX(0); }
        }
        @media (max-width: 900px) {
            .weather-form { 
                grid-template-columns: repeat(2, 1fr);
            }
            .results {
                grid-template-columns: 1fr;
            }
        }
        @media (max-width: 600px) {
            .weather-form { 
                grid-template-columns: 1fr; 
                padding: 24px;
            }
            h1 { font-size: 2rem; }
            .location-card { padding: 20px; }
            .results {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<div class="grid-bg"></div>
<div class="weather-container">
    <h1>中央氣象署預報測試</h1>
    <p>透過下方參數呼叫 `/api/weather/forecast`，快速驗證開放資料 API 回傳內容。</p>

    <form id="forecastForm" class="weather-form">
        <div>
            <label for="timeFrom">開始時間 (ISO)</label>
            <input type="datetime-local" id="timeFrom" name="timeFrom">
        </div>
        <div>
            <label for="timeTo">結束時間 (ISO)</label>
            <input type="datetime-local" id="timeTo" name="timeTo">
        </div>
        <div>
            <label for="locationName">地區 (選填)</label>
            <input type="text" id="locationName" name="locationName" placeholder="例如：臺北市">
        </div>
        <div>
            <label for="elementName">元素 (選填)</label>
            <input type="text" id="elementName" name="elementName" placeholder="例如：Wx, PoP, MinT, MaxT">
        </div>
        <div>
            <label for="limit">筆數 (默認 10)</label>
            <input type="number" id="limit" name="limit" min="1" value="10">
        </div>
        <div>
            <label for="offset">偏移 (默認 1)</label>
            <input type="number" id="offset" name="offset" min="1" value="1">
        </div>
        <button type="submit">查詢預報</button>
    </form>

    <div id="status" class="status"></div>
    <div id="results" class="results"></div>

    <div class="raw-json">
        <h2>原始回應</h2>
        <pre id="rawJson">尚未查詢</pre>
    </div>
</div>

<script src="/js/weather.js"></script>
</body>
</html>
