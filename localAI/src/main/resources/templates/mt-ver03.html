<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIOps 全域戰情室 | Intelligent Overwatch</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Share+Tech+Mono&display=swap"
        rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-dark: #050508;
            --bg-card: rgba(20, 20, 25, 0.6);
            --bg-glass: rgba(18, 18, 24, 0.85);
            --text-main: #e0e0e0;
            --text-muted: #8899a6;
            --accent: #00f2ff;
            --accent-glow: rgba(0, 242, 255, 0.5);
            --success: #00ff9d;
            --warning: #ffb300;
            --danger: #ff2a6d;
            --glass-border: 1px solid rgba(255, 255, 255, 0.08);
            --font-tech: 'Share Tech Mono', monospace;
            --font-code: 'JetBrains Mono', monospace;
        }

        body {
            font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            overflow-y: scroll;
            overflow-x: hidden;
            background-image: linear-gradient(rgba(0, 242, 255, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 242, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            background-position: center top;
            animation: gridMove 20s linear infinite;
        }

        @keyframes gridMove {
            0% {
                background-position: 0 0;
            }

            100% {
                background-position: 0 40px;
            }
        }

        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 99999;
            opacity: 0.3;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #000;
        }

        ::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent);
            box-shadow: 0 0 10px var(--accent);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding-bottom: 120px;
            position: relative;
            z-index: 1;
        }

        .glass-panel {
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: var(--glass-border);
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 25px 30px;
            position: relative;
            overflow: hidden;
        }

        .header-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            opacity: 0.7;
        }

        h1 {
            margin: 0;
            font-weight: 300;
            font-size: 2em;
            letter-spacing: 2px;
        }

        .monitor-meta {
            font-family: var(--font-tech);
            color: var(--accent);
            margin-top: 5px;
            font-size: 0.9em;
            letter-spacing: 1px;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0, 255, 157, 0.05);
            color: var(--success);
            padding: 8px 16px;
            border-radius: 4px;
            font-family: var(--font-tech);
            border: 1px solid rgba(0, 255, 157, 0.2);
            box-shadow: 0 0 15px rgba(0, 255, 157, 0.1) inset;
        }

        .pulse-dot {
            width: 8px;
            height: 8px;
            background: var(--success);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--success);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                opacity: 0.4;
            }

            70% {
                opacity: 1;
            }

            100% {
                opacity: 0.4;
            }
        }

        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .kpi-card {
            padding: 25px;
            position: relative;
            overflow: hidden;
            border-left: 2px solid transparent;
        }

        .kpi-card:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.5);
            background: rgba(30, 30, 40, 0.8);
        }

        .kpi-card::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.05) 0%, transparent 60%);
            opacity: 0;
            transform: scale(0.5);
            transition: 0.5s;
        }

        .kpi-card:hover::after {
            opacity: 1;
            transform: scale(1);
        }

        .kpi-icon {
            position: absolute;
            right: 20px;
            top: 20px;
            font-size: 3em;
            opacity: 0.1;
            transition: 0.3s;
        }

        .kpi-card:hover .kpi-icon {
            opacity: 0.2;
            transform: rotate(-10deg);
        }

        .kpi-title {
            font-family: var(--font-tech);
            font-size: 0.9em;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .kpi-value {
            font-family: var(--font-code);
            font-size: 3.5em;
            font-weight: 700;
            margin: 5px 0;
            background: linear-gradient(180deg, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .kpi-card.total {
            border-left-color: var(--accent);
        }

        .kpi-card.crit {
            border-left-color: var(--danger);

            .kpi-value {
                color: var(--danger);
                -webkit-text-fill-color: var(--danger);
            }
        }

        .kpi-card.warn {
            border-left-color: var(--warning);

            .kpi-value {
                color: var(--warning);
                -webkit-text-fill-color: var(--warning);
            }
        }

        .kpi-card.healthy {
            border-left-color: var(--success);
        }

        .chart-card {
            padding: 30px;
            min-height: 250px;
            border: 1px solid rgba(0, 188, 212, 0.2);
        }

        .bar-chart {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 25px;
        }

        .bar-row {
            display: flex;
            align-items: center;
            gap: 20px;
            cursor: pointer;
            transition: 0.3s;
            padding: 8px 12px;
            border-radius: 4px;
        }

        .bar-row:hover {
            background: rgba(255, 255, 255, 0.03);
            transform: translateX(5px);
        }

        .bar-label {
            width: 150px;
            font-family: var(--font-tech);
            font-size: 1em;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .bar-track {
            flex: 1;
            height: 8px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 2px;
            overflow: hidden;
            position: relative;
        }

        .bar-fill {
            height: 100%;
            border-radius: 2px;
            transition: width 1s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 0 10px currentColor;
            position: relative;
            overflow: hidden;
        }

        .bar-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, rgba(255, 255, 255, 0.1) 25%, transparent 25%, transparent 50%, rgba(255, 255, 255, 0.1) 50%, rgba(255, 255, 255, 0.1) 75%, transparent 75%, transparent);
            background-size: 20px 20px;
            animation: stripeMove 1s linear infinite;
        }

        @keyframes stripeMove {
            0% {
                background-position: 0 0;
            }

            100% {
                background-position: 20px 0;
            }
        }

        .bar-count {
            width: 50px;
            text-align: right;
            font-family: var(--font-code);
            font-weight: bold;
            color: #fff;
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 10px;
        }

        .section-title {
            font-size: 1.2em;
            font-weight: 400;
            color: var(--accent);
            font-family: var(--font-tech);
            letter-spacing: 1px;
        }

        .filter-tag {
            font-size: 0.8em;
            color: #000;
            background: var(--accent);
            padding: 2px 8px;
            border-radius: 2px;
            font-weight: bold;
        }

        .host-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .host-card {
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            gap: 12px;
            position: relative;
            overflow: hidden;
        }

        .host-card:hover {
            border-color: var(--accent);
            box-shadow: 0 0 15px var(--accent-glow);
            transform: translateY(-5px);
            z-index: 10;
        }

        .host-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .host-title {
            font-weight: bold;
            color: #fff;
            font-size: 1.1em;
            font-family: var(--font-code);
        }

        .host-ip {
            font-size: 0.8em;
            color: var(--text-muted);
            font-family: var(--font-code);
            margin-top: 4px;
            display: block;
        }

        .host-elements {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-top: auto;
        }

        .element-badge {
            font-size: 0.7em;
            padding: 2px 6px;
            border-radius: 2px;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-muted);
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-family: var(--font-tech);
        }

        .metric-badge {
            padding: 4px 8px;
            border-radius: 2px;
            font-size: 0.8em;
            font-weight: 700;
            font-family: var(--font-code);
            text-shadow: 0 0 5px currentColor;
        }

        .s-crit {
            color: var(--danger);
            border: 1px solid var(--danger);
            background: rgba(255, 42, 109, 0.1);
        }

        .s-warn {
            color: var(--warning);
            border: 1px solid var(--warning);
            background: rgba(255, 179, 0, 0.1);
        }

        .s-ok {
            color: var(--success);
            border: 1px solid var(--success);
            background: rgba(0, 255, 157, 0.1);
        }

        /* AI Widget */
        .ai-widget-container {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 20px;
        }

        .ai-orb {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.9) 0%, var(--accent) 20%, #000 70%);
            box-shadow: 0 0 30px var(--accent-glow), 0 0 60px var(--accent-glow);
            cursor: pointer;
            position: relative;
            transition: all 0.5s;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px solid rgba(255, 255, 255, 0.2);
            animation: floatOrb 6s ease-in-out infinite;
        }

        @keyframes floatOrb {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        .ai-orb i {
            font-size: 28px;
            color: #fff;
            text-shadow: 0 0 10px var(--accent);
        }

        .ai-orb:hover {
            transform: scale(1.1) rotate(10deg);
            box-shadow: 0 0 50px var(--accent);
        }

        .ai-ring {
            position: absolute;
            top: -5px;
            left: -5px;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 2px solid transparent;
            border-top-color: var(--accent);
            border-bottom-color: var(--accent);
            animation: spin 4s linear infinite;
            opacity: 0.6;
            pointer-events: none;
        }

        .ai-ring::before {
            content: '';
            position: absolute;
            top: 5px;
            left: 5px;
            right: 5px;
            bottom: 5px;
            border-radius: 50%;
            border: 2px solid transparent;
            border-left-color: #fff;
            border-right-color: #fff;
            animation: spin 2s reverse linear infinite;
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }

        .status-busy .ai-orb {
            background: radial-gradient(circle at 30% 30%, #fff 0%, var(--warning) 20%, #000 70%);
            box-shadow: 0 0 30px var(--warning);
            animation: spin 1s linear infinite;
        }

        .ai-window {
            width: 450px;
            background: rgba(15, 15, 20, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid var(--accent);
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transform-origin: bottom right;
            transform: scale(0);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .ai-window.active {
            transform: scale(1);
            opacity: 1;
        }

        .ai-window-header {
            background: linear-gradient(90deg, rgba(0, 242, 255, 0.1), transparent);
            padding: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .ai-title {
            font-family: var(--font-tech);
            color: var(--accent);
            font-size: 1.1em;
        }

        .ai-body {
            padding: 20px;
            max-height: 60vh;
            overflow-y: auto;
            color: #ddd;
            font-size: 0.95em;
            line-height: 1.6;
        }

        /* ----------------------------------------------------- */
        /* ★★★ 優化後的 Markdown 渲染樣式 ★★★ */
        /* 標題 H3 - 作為區塊標題 */
        .ai-body h3 {
            color: var(--accent);
            font-family: var(--font-tech);
            font-size: 1.1em;
            margin-top: 15px;
            margin-bottom: 8px;
            border-bottom: 1px dashed rgba(255, 255, 255, 0.1);
            padding-bottom: 5px;
        }

        /* 列表 - 增加縮排與間距 */
        .ai-body ul {
            padding-left: 20px;
            color: #ccc;
            margin-top: 5px;
            margin-bottom: 15px;
        }

        .ai-body li {
            margin-bottom: 6px;
            line-height: 1.5;
        }

        /* 粗體 - 增加背景色強調 */
        .ai-body strong {
            color: #fff;
            background: rgba(0, 242, 255, 0.15);
            padding: 2px 5px;
            border-radius: 3px;
            font-weight: 600;
        }

        /* ----------------------------------------------------- */

        .ai-footer {
            padding: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.2);
        }

        .ai-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 15px;
        }

        .ai-chip {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--accent);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8em;
            cursor: pointer;
            transition: 0.2s;
            font-family: var(--font-code);
        }

        .ai-chip:hover {
            background: var(--accent);
            color: #000;
        }

        .btn-action {
            width: 100%;
            padding: 10px;
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            font-family: var(--font-tech);
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-action:hover:not(:disabled) {
            background: var(--accent);
            color: #000;
        }

        .btn-action:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .active-context {
            background: #222;
            padding: 8px 15px;
            margin: -20px -20px 10px -20px;
            border-bottom: 1px dashed #444;
            display: none;
            flex-wrap: wrap;
            gap: 8px;
        }

        .active-context.show {
            display: flex;
        }

        .ctx-tag {
            background: var(--accent);
            color: #000;
            font-size: 0.75em;
            padding: 2px 8px;
            border-radius: 2px;
            font-weight: bold;
            cursor: pointer;
        }

        .fade-in {
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="glass-panel header-section">
            <div>
                <h1>AIOps <span style="color:var(--accent);">Global Overwatch</span></h1>
                <div class="monitor-meta">
                    <i class="fa-solid fa-server"></i> REGION: AZURE-TOKYO-01 &nbsp;
                    <i class="fa-solid fa-brain"></i> Agent: <span id="model-name"
                        th:text="${modelName} ?: 'Live Simulation'" style="color: #00bcd4;">Llama 3.2</span>
                </div>
            </div>
            <div style="text-align: right;">
                <div class="status-badge">
                    <div class="pulse-dot"></div> SYSTEM ONLINE
                </div>
                <div style="font-family: var(--font-code); color: #666; margin-top: 5px; font-size: 0.8em;">
                    NEXT UPDATE: <span id="countdown" style="color:var(--text-main);">300</span>s
                </div>
            </div>
        </div>

        <div class="kpi-grid">
            <div class="glass-panel kpi-card total">
                <i class="fa-solid fa-network-wired kpi-icon"></i>
                <div class="kpi-title">HOST COUNT</div>
                <div class="kpi-value" id="total-hosts">0</div>
            </div>
            <div class="glass-panel kpi-card crit">
                <i class="fa-solid fa-triangle-exclamation kpi-icon"></i>
                <div class="kpi-title">CRITICAL ALERTS</div>
                <div class="kpi-value" id="crit-hosts">0</div>
            </div>
            <div class="glass-panel kpi-card warn">
                <i class="fa-solid fa-bell kpi-icon"></i>
                <div class="kpi-title">WARNINGS</div>
                <div class="kpi-value" id="warn-hosts">0</div>
            </div>
            <div class="glass-panel kpi-card healthy">
                <i class="fa-solid fa-shield-heart kpi-icon"></i>
                <div class="kpi-title">HEALTHY SYSTEMS</div>
                <div class="kpi-value" id="ok-hosts">0</div>
            </div>
        </div>

        <div class="insights-section">
            <div class="glass-panel chart-card">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <h3 style="margin: 0; font-weight: 300; font-family: var(--font-tech); color: #fff;">
                        <i class="fa-solid fa-chart-bar" style="color:var(--accent)"></i> ANOMALY DISTRIBUTION
                    </h3>
                </div>
                <div class="bar-chart" id="issue-chart"></div>
            </div>
        </div>

        <div class="section-header">
            <h3 class="section-title">INFRASTRUCTURE GRID</h3>
            <span id="list-filter-label" class="filter-tag">ALL HOSTS</span>
        </div>
        <div class="host-grid" id="host-grid"></div>
    </div>

    <div class="ai-widget-container" id="ai-widget-container">
        <div class="ai-window" id="ai-window">
            <div class="ai-window-header">
                <div class="ai-title"><i class="fa-solid fa-microchip"></i> TACTICAL AI ANALYST</div>
                <div style="cursor: pointer; opacity: 0.7;" onclick="toggleWidget()">
                    <i class="fa-solid fa-xmark"></i>
                </div>
            </div>
            <div class="ai-body">
                <div id="ai-context-bar" class="active-context"></div>
                <div id="ai-content" class="fade-in">SYSTEM STANDBY. WAITING FOR TELEMETRY DATA...</div>
            </div>
            <div class="ai-footer">
                <div id="ai-tags" class="ai-chips"></div>
                <button id="btn-reanalyze" class="btn-action" onclick="triggerAIAnalysis()">
                    <i class="fa-solid fa-rotate"></i> RE-SCAN & ANALYZE
                </button>
            </div>
        </div>
        <div class="ai-orb" onclick="toggleWidget()" id="ai-orb">
            <div class="ai-ring"></div>
            <i class="fa-solid fa-robot"></i>
        </div>
    </div>

    <script>
        const AUTO_REFRESH_INTERVAL = 300;
        let hosts = [];
        let activeTags = new Set();
        let countdownVal = AUTO_REFRESH_INTERVAL;

        const issueTypes = {
            "CPU_SATURATION": { label: "CPU OVERLOAD", color: "#ff2a6d" },
            "MEM_LEAK": { label: "MEMORY LEAK", color: "#ffb300" },
            "SSL_EXPIRY": { label: "SSL EXPIRY", color: "#d264ff" },
            "WEB_ERROR": { label: "WEB ERROR", color: "#ff2a6d" },
            "HEALTHY": { label: "HEALTHY", color: "#00ff9d" }
        };

        function parseRealData(jsonData) {
            const rawList = jsonData.data.list;
            const adaptedHosts = [];
            rawList.forEach(item => {
                let status = 'OK', issueType = 'HEALTHY', metricLabel = 'OK', alchemyElements = [];
                if (item.serviceList && item.serviceList.length > 0) {
                    let cpuUsage = 0, memUsage = 0;
                    const cpuSvc = item.serviceList.find(s => s.service === 'check_cpu');
                    const memSvc = item.serviceList.find(s => s.service === 'check_mem');
                    if (cpuSvc && cpuSvc.pluginOutput) {
                        const m = cpuSvc.pluginOutput.match(/usage[:\s]+(\d+)/);
                        if (m) cpuUsage = parseInt(m[1]);
                    }
                    if (memSvc && memSvc.pluginOutput) {
                        const m = memSvc.pluginOutput.match(/perc[:\s]+(\d+)/);
                        if (m) memUsage = parseInt(m[1]);
                    }
                    if (memUsage > 90) { status = 'CRIT'; issueType = 'MEM_LEAK'; metricLabel = `MEM ${memUsage}%`; alchemyElements = ['MEMORY LEAK']; }
                    else if (cpuUsage > 80) { status = 'WARN'; issueType = 'CPU_SATURATION'; metricLabel = `CPU ${cpuUsage}%`; alchemyElements = ['CPU SATURATION']; }
                    else { metricLabel = `CPU ${cpuUsage}%`; }
                } else if (item.pluginOutput) {
                    if (item.alias.includes("憑證")) {
                        const dayMatch = item.pluginOutput.match(/天數\s*(\d+)/);
                        if (dayMatch) {
                            const days = parseInt(dayMatch[1]);
                            metricLabel = `SSL ${days}d`;
                            if (days < 45) { status = 'WARN'; issueType = 'SSL_EXPIRY'; alchemyElements = ['SSL CERT']; }
                        }
                    } else if (item.pluginOutput.includes("code 403") || item.pluginOutput.includes("code 500")) {
                        status = 'CRIT'; issueType = 'WEB_ERROR'; metricLabel = `HTTP Err`; alchemyElements = ['WEB ERROR'];
                    } else { metricLabel = 'HTTP 200'; }
                }
                adaptedHosts.push({ id: item.alias || item.host, ip: item.host, status, issueType, metric: metricLabel, elements: alchemyElements });
            });
            return adaptedHosts;
        }

        function animateValue(obj, start, end, duration) {
            if (!obj) return;
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                obj.innerHTML = Math.floor(progress * (end - start) + start);
                if (progress < 1) window.requestAnimationFrame(step);
            };
            window.requestAnimationFrame(step);
        }

        function renderDashboard() {
            const stats = {
                total: hosts.length,
                crit: hosts.filter(h => h.status === 'CRIT').length,
                warn: hosts.filter(h => h.status === 'WARN').length,
                ok: hosts.filter(h => h.status === 'OK').length
            };
            animateValue(document.getElementById('total-hosts'), 0, stats.total, 800);
            animateValue(document.getElementById('crit-hosts'), 0, stats.crit, 800);
            animateValue(document.getElementById('warn-hosts'), 0, stats.warn, 800);
            animateValue(document.getElementById('ok-hosts'), 0, stats.ok, 800);

            const issueCounts = {};
            hosts.filter(h => h.status !== 'OK').forEach(h => { issueCounts[h.issueType] = (issueCounts[h.issueType] || 0) + 1; });
            const chartContainer = document.getElementById('issue-chart');
            chartContainer.innerHTML = '';
            Object.keys(issueCounts).forEach(type => {
                const count = issueCounts[type], meta = issueTypes[type];
                const row = document.createElement('div');
                row.className = 'bar-row';
                row.onclick = () => filterHostList(type);
                row.innerHTML = `<div class="bar-label" style="color:${meta.color}">${meta.label}</div><div class="bar-track"><div class="bar-fill" style="width:100%; background:${meta.color}"></div></div><div class="bar-count">${count}</div>`;
                chartContainer.appendChild(row);
            });
            renderHostList(hosts);
        }

        function renderHostList(data) {
            const grid = document.getElementById('host-grid');
            grid.innerHTML = '';
            data.forEach(h => {
                const card = document.createElement('div');
                card.className = 'glass-panel host-card';
                let statusClass = h.status === 'CRIT' ? 's-crit' : (h.status === 'WARN' ? 's-warn' : 's-ok');
                card.innerHTML = `<div class="host-header"><div><div class="host-title">${h.id}</div><div class="host-ip">${h.ip}</div></div><div class="metric-badge ${statusClass}">${h.metric}</div></div>`;
                grid.appendChild(card);
            });
        }

        function filterHostList(issueType) {
            renderHostList(hosts.filter(h => h.issueType === issueType));
            document.getElementById('list-filter-label').innerText = issueTypes[issueType].label;
        }

        function toggleWidget(forceOpen = false) {
            const windowEl = document.getElementById('ai-window');
            if (forceOpen) windowEl.classList.add('active'); else windowEl.classList.toggle('active');
        }

        function updateOrbStatus(status) {
            const container = document.getElementById('ai-widget-container');
            container.className = 'ai-widget-container';
            if (status === 'busy') container.classList.add('status-busy');
        }

        // --- 互動標籤 Context Tag ---
        function addContextTag(tag) {
            if (activeTags.has(tag)) return;
            activeTags.add(tag);
            renderActiveTags();
            triggerAIAnalysis(true); // 觸發聚焦分析
        }

        function removeContextTag(tag) {
            activeTags.delete(tag);
            renderActiveTags();
            triggerAIAnalysis(true);
        }

        function renderActiveTags() {
            const container = document.getElementById('ai-context-bar');
            container.innerHTML = '';
            if (activeTags.size === 0) {
                container.classList.remove('show');
                return;
            }
            container.classList.add('show');
            const label = document.createElement('span');
            label.style.cssText = 'font-size:0.7em; color:#888; display:flex; align-items:center; margin-right:5px;';
            label.innerText = 'FOCUS:';
            container.appendChild(label);
            activeTags.forEach(tag => {
                const el = document.createElement('div');
                el.className = 'ctx-tag';
                el.innerHTML = `${tag} <span onclick="removeContextTag('${tag}')" style="margin-left:5px;">&times;</span>`;
                container.appendChild(el);
            });
        }

        // --- AI 分析核心 ---
        async function triggerAIAnalysis(isRefinement = false) {
            const btn = document.getElementById('btn-reanalyze');
            const aiContent = document.getElementById('ai-content');
            const aiTags = document.getElementById('ai-tags');

            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-gear fa-spin"></i> THINKING...';
            updateOrbStatus('busy');

            // 數據統計
            const stats = {
                crit: hosts.filter(h => h.status === 'CRIT').length,
                warn: hosts.filter(h => h.status === 'WARN').length,
                issues: {}
            };
            hosts.filter(h => h.status !== 'OK').forEach(h => {
                stats.issues[h.issueType] = (stats.issues[h.issueType] || 0) + 1;
            });

            // 建構專家級 Prompt
            let prompt = `你是一位擁有 20 年經驗的資深 SRE (網站可靠性工程師) 與 AIOps 系統監控專家。
請根據以下數據進行診斷：
- 嚴重告警 (CRITICAL): ${stats.crit}
- 警告 (WARNING): ${stats.warn}
- 異常分佈: ${JSON.stringify(stats.issues)}
`;

            if (activeTags.size > 0) {
                const focusTopics = Array.from(activeTags).join(', ');
                const relatedHosts = hosts.filter(h =>
                    activeTags.has(h.issueType) || h.elements.some(el => activeTags.has(el))
                ).map(h => `${h.id}(${h.metric})`).join(', ');

                prompt += `\n[FOCUS] 使用者關注標籤：[${focusTopics}]。
[EVIDENCE] 相關主機數據：${relatedHosts}。
[TASK] 針對關注點進行深度根因分析與具體修復建議。`;
            } else {
                prompt += `\n[TASK] 提供全域戰情摘要與最優先處理事項。`;
            }

            prompt += `
[輸出規範]
1. 語言: 繁體中文 (Traditional Chinese)。
2. 格式: 純 JSON 字串 (嚴禁 Markdown code block)。
3. 內容結構 (summary 欄位請用 Markdown 排版):
   - 使用 ### 小標題 分隔區塊 (例如: ### 🔴 嚴重告警分析, ### 🟡 風險預警, ### 🛡️ 建議行動)。
   - 使用條列式 (Bullet points) 呈現細節。
   - 關鍵數據或名詞使用 **粗體** 強調。
   - 保持簡潔有力，直指核心問題。

[JSON 範例]
{
    "summary": "### 🚀 戰情摘要\\n目前系統處於 **高風險狀態**...\\n\\n### 🔥 核心問題\\n- **CPU 過載**: DB-01 主機 CPU 使用率達 98%...",
    "tags": ["CPU", "DB"]
}
`;

            try {
                const formData = new FormData();
                formData.append('message', prompt);

                // 真實請求
                const response = await fetch("/api/monitor/analyze", { method: 'POST', body: formData });
                const resJson = await response.json();

                if (resJson.status === 'success') {
                    // 分析成功後才彈出視窗
                    toggleWidget(true);

                    // 清理並解析 JSON
                    let rawText = resJson.response.replace(/```json/gi, '').replace(/```/g, '').trim();
                    // 嘗試抓取 JSON 物件部分
                    const jsonMatch = rawText.match(/\{[\s\S]*\}/);

                    let data = {};
                    if (jsonMatch) {
                        data = JSON.parse(jsonMatch[0]);
                    } else {
                        // 如果沒有 JSON 結構，將整段文字當作 summary
                        data = { summary: rawText, tags: ["General Analysis"] };
                    }

                    // 渲染 Markdown
                    if (typeof marked !== 'undefined') {
                        aiContent.innerHTML = marked.parse(data.summary);
                    } else {
                        aiContent.innerText = data.summary;
                    }
                    aiContent.classList.add('fade-in');

                    // 渲染 Tags
                    if (data.tags) {
                        aiTags.innerHTML = data.tags.map(tag =>
                            `<div class="ai-chip" onclick="addContextTag('${tag}')">${tag}</div>`
                        ).join('');
                    }
                } else {
                    aiContent.innerHTML = `<span style="color:var(--danger)">分析錯誤: ${resJson.message}</span>`;
                    toggleWidget(true);
                }
            } catch (e) {
                console.error(e);
                aiContent.innerHTML = `<span style="color:var(--danger)">連線失敗: ${e.message}</span>`;
                toggleWidget(true);
            } finally {
                updateOrbStatus('idle');
                btn.disabled = false;
                btn.innerHTML = '<i class="fa-solid fa-rotate"></i> RE-SCAN & ANALYZE';
            }
        }

        async function initSystem() {
            try {
                // 嘗試從 API 讀取真實數據
                const response = await fetch('/api/monitor/data');
                const jsonData = await response.json();
                if (jsonData.modelName) document.getElementById('model-name').innerText = jsonData.modelName;
                if (jsonData.serverData) {
                    hosts = parseRealData(jsonData.serverData);
                    renderDashboard();
                }
            } catch (e) {
                console.error("Init Error:", e);
            }

            // 首次自動執行 AI 分析
            setTimeout(() => triggerAIAnalysis(), 1000);

            // 定時更新
            setInterval(async () => {
                countdownVal--;
                if (countdownVal <= 0) {
                    countdownVal = AUTO_REFRESH_INTERVAL;
                    try {
                        const response = await fetch('/api/monitor/data');
                        const jsonData = await response.json();
                        if (jsonData.serverData) {
                            hosts = parseRealData(jsonData.serverData);
                            renderDashboard();
                            triggerAIAnalysis();
                        }
                    } catch (e) { console.error(e); }
                }
                document.getElementById('countdown').innerText = countdownVal;
            }, 1000);
        }
        window.addEventListener('load', initSystem);
    </script>
