<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIOps 全域戰情室 | Intelligent Overwatch</title>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-dark: #0f0f12;
            --bg-card: #1a1a1f;
            --bg-glass: rgba(30, 30, 35, 0.85);
            --text-main: #e0e0e0;
            --text-muted: #888;
            --accent: #00bcd4;
            --accent-glow: rgba(0, 188, 212, 0.4);
            --success: #00e676;
            --warning: #ffb74d;
            --danger: #ff5252;
            --glass-border: 1px solid rgba(255, 255, 255, 0.08);
        }

        body {
            font-family: 'Segoe UI', 'Microsoft JhengHei', 'Roboto', sans-serif;
            background: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            overflow-y: scroll;
            overflow-x: hidden;
        }

        /* 自定義捲軸 */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #111;
        }

        ::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding-bottom: 100px;
            /* 留給右下角 Widget 的空間 */
        }

        /* --- Header --- */
        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 20px;
            background: linear-gradient(90deg, rgba(0, 188, 212, 0.05) 0%, rgba(0, 0, 0, 0) 100%);
            border-radius: 16px;
            border: var(--glass-border);
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 230, 118, 0.1);
            color: var(--success);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            border: 1px solid rgba(0, 230, 118, 0.2);
        }

        .pulse-dot {
            width: 8px;
            height: 8px;
            background: currentColor;
            border-radius: 50%;
            box-shadow: 0 0 8px currentColor;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                opacity: 0.5;
            }

            50% {
                opacity: 1;
            }

            100% {
                opacity: 0.5;
            }
        }

        /* --- KPI Grid --- */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .kpi-card {
            background: var(--bg-card);
            padding: 25px;
            border-radius: 16px;
            border: var(--glass-border);
            position: relative;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .kpi-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .kpi-icon {
            position: absolute;
            right: 20px;
            top: 20px;
            font-size: 2.5em;
            opacity: 0.1;
        }

        .kpi-title {
            font-size: 0.85em;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .kpi-value {
            font-size: 3em;
            font-weight: 700;
            margin: 10px 0;
            letter-spacing: -1px;
            background: linear-gradient(to bottom, #fff, #aaa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .kpi-card.total {
            border-top: 3px solid var(--accent);
        }

        .kpi-card.crit {
            border-top: 3px solid var(--danger);
        }

        .kpi-card.warn {
            border-top: 3px solid var(--warning);
        }

        .kpi-card.healthy {
            border-top: 3px solid var(--success);
        }

        /* --- Insights Section (Chart Only) --- */
        .insights-section {
            margin-bottom: 40px;
        }

        .chart-card {
            background: var(--bg-card);
            padding: 30px;
            border-radius: 16px;
            border: var(--glass-border);
            display: flex;
            flex-direction: column;
            min-height: 250px;
        }

        .bar-chart {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 20px;
        }

        .bar-row {
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            transition: 0.2s;
            padding: 8px;
            border-radius: 8px;
        }

        .bar-row:hover {
            background: rgba(255, 255, 255, 0.05);
            transform: translateX(5px);
        }

        .bar-label {
            width: 150px;
            font-size: 0.9em;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .bar-track {
            flex: 1;
            height: 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 6px;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            border-radius: 6px;
            transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 10px currentColor;
        }

        .bar-count {
            width: 50px;
            text-align: right;
            font-weight: bold;
            font-family: 'Consolas', monospace;
        }

        /* --- Host Grid --- */
        .section-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 1.4em;
            font-weight: 300;
            color: #fff;
        }

        .host-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
        }

        .host-card {
            background: var(--bg-card);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid transparent;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            gap: 12px;
            position: relative;
        }

        .host-card:hover {
            transform: translateY(-3px);
            background: #222228;
            border-color: #444;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .host-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .host-title {
            font-weight: bold;
            color: #fff;
            font-size: 1.1em;
        }

        .host-ip {
            font-size: 0.85em;
            color: var(--text-muted);
            font-family: monospace;
            margin-top: 4px;
            display: block;
        }

        .host-elements {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-top: auto;
        }

        .element-badge {
            font-size: 0.75em;
            padding: 3px 8px;
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.05);
            color: #bbb;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .metric-badge {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.85em;
            font-weight: 700;
            font-family: monospace;
        }

        .s-crit {
            background: rgba(255, 82, 82, 0.1);
            color: var(--danger);
            border: 1px solid rgba(255, 82, 82, 0.3);
        }

        .s-warn {
            background: rgba(255, 183, 77, 0.1);
            color: var(--warning);
            border: 1px solid rgba(255, 183, 77, 0.3);
        }

        .s-ok {
            background: rgba(0, 230, 118, 0.1);
            color: var(--success);
            border: 1px solid rgba(0, 230, 118, 0.3);
        }

        /* =========================================
           AI CO-PILOT WIDGET (右下角懸浮視窗)
           ========================================= */
        .ai-widget-container {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 15px;
            font-family: 'Segoe UI', sans-serif;
        }

        /* 1. 懸浮按鈕 (FAB) */
        .ai-fab {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #1e1e1e, #2a2a2a);
            border: 2px solid var(--accent);
            box-shadow: 0 0 20px var(--accent-glow);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }

        .ai-fab:hover {
            transform: scale(1.1);
            box-shadow: 0 0 30px var(--accent-glow);
        }

        .ai-fab-icon {
            font-size: 30px;
        }

        /* 狀態指示燈 */
        .ai-status-indicator {
            position: absolute;
            top: 0;
            right: 0;
            width: 15px;
            height: 15px;
            background: #4CAF50;
            border: 2px solid #121212;
            border-radius: 50%;
        }

        .ai-status-indicator.busy {
            background: #FFC107;
            animation: pulse 1s infinite;
        }

        .ai-status-indicator.error {
            background: #FF5252;
        }

        /* 2. 對話視窗 (Chat Window) */
        .ai-window {
            width: 400px;
            max-height: 0;
            /* 預設收合 */
            background: var(--bg-glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 188, 212, 0.3);
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.19, 1, 0.22, 1);
            opacity: 0;
            transform: translateY(20px) scale(0.95);
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        /* 展開狀態 class */
        .ai-window.active {
            max-height: 80vh;
            /* 最大高度 */
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        .ai-window-header {
            padding: 15px 20px;
            background: rgba(0, 188, 212, 0.1);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .ai-title {
            font-weight: bold;
            color: var(--accent);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .ai-window-body {
            padding: 20px;
            overflow-y: auto;
            flex: 1;
        }

        .ai-content {
            font-size: 0.95em;
            line-height: 1.6;
            color: #eee;
        }

        /* Markdown Styles Inside Widget */
        .ai-content h1,
        .ai-content h2 {
            font-size: 1.1em;
            color: var(--accent);
            margin: 10px 0 5px;
        }

        .ai-content ul {
            padding-left: 20px;
            color: #ccc;
            margin: 5px 0;
        }

        .ai-content li {
            margin-bottom: 4px;
        }

        .ai-content strong {
            color: #fff;
            background: rgba(255, 255, 255, 0.1);
            padding: 0 4px;
            border-radius: 3px;
        }

        .ai-context-bar {
            padding: 10px 20px;
            border-top: 1px dashed rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.2);
            min-height: 40px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .context-chip {
            background: var(--accent);
            color: #000;
            font-size: 0.8em;
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 5px;
            animation: slideIn 0.3s;
        }

        .context-remove {
            cursor: pointer;
            opacity: 0.6;
        }

        .context-remove:hover {
            opacity: 1;
        }

        .ai-footer {
            padding: 15px 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .ai-suggest-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .tag-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--accent);
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.8em;
            cursor: pointer;
            transition: 0.2s;
        }

        .tag-btn:hover {
            background: var(--accent);
            color: #000;
        }

        .ai-action-btn {
            width: 100%;
            padding: 10px;
            background: transparent;
            border: 1px solid var(--text-muted);
            color: var(--text-muted);
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .ai-action-btn:hover:not(:disabled) {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(0, 188, 212, 0.05);
        }

        .ai-action-btn:disabled {
            opacity: 0.5;
            cursor: wait;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(10px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* 響應式 */
        @media (max-width: 600px) {
            .ai-window {
                width: 90vw;
                bottom: 80px;
                right: 5vw;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="header-section">
            <div>
                <h1 style="margin: 0; font-weight: 300; font-size: 1.8em;">AIOps <span
                        style="font-weight: 700; color: #fff;">全域戰情室</span></h1>
                <p style="color: var(--text-muted); margin: 5px 0 0 0; font-size: 0.9em;">
                    <i class="fa-solid fa-server"></i> AWS Tokyo &nbsp;|&nbsp;
                    <i class="fa-solid fa-brain"></i> Llama 3.2 Engine
                </p>
            </div>
            <div style="text-align: right;">
                <div class="status-badge">
                    <div class="pulse-dot"></div> 系統實時監控中
                </div>
                <div style="font-size: 0.8em; margin-top: 8px; color: #555;">更新倒數 <span id="countdown">300</span>s</div>
            </div>
        </div>

        <div class="kpi-grid">
            <div class="kpi-card total">
                <i class="fa-solid fa-layer-group kpi-icon"></i>
                <div class="kpi-title">監控主機總數</div>
                <div class="kpi-value" id="total-hosts">0</div>
                <div class="kpi-sub" style="color: var(--accent);">● 100% 連線正常</div>
            </div>
            <div class="kpi-card crit">
                <i class="fa-solid fa-triangle-exclamation kpi-icon"></i>
                <div class="kpi-title">嚴重告警 (Critical)</div>
                <div class="kpi-value" id="crit-hosts" style="color: var(--danger);">0</div>
                <div class="kpi-sub">需立即介入處理</div>
            </div>
            <div class="kpi-card warn">
                <div class="kpi-title">警告通知 (Warnings)</div>
                <div class="kpi-value" id="warn-hosts" style="color: var(--warning);">0</div>
                <div class="kpi-sub">潛在效能風險</div>
            </div>
            <div class="kpi-card healthy">
                <div class="kpi-title">健康系統</div>
                <div class="kpi-value" id="ok-hosts" style="color: var(--success);">0</div>
                <div class="kpi-sub">運作狀態最佳</div>
            </div>
        </div>

        <div class="insights-section">
            <div class="chart-card">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <h3 style="margin: 0; font-weight: 400; color:#fff;"><i class="fa-solid fa-chart-simple"></i> 異常類型分佈
                    </h3>
                    <span style="font-size: 0.8em; color: var(--text-muted);">點擊長條圖可過濾下方列表</span>
                </div>
                <div class="bar-chart" id="issue-chart">
                </div>
            </div>
        </div>

        <div class="section-header">
            <h3 class="section-title">基礎設施列表</h3>
            <span id="list-filter-label"
                style="font-size: 0.8em; color: var(--text-muted); background: #333; padding: 4px 10px; border-radius: 4px;">顯示全部</span>
        </div>
        <div class="host-grid" id="host-grid">
        </div>
    </div>

    <div class="ai-widget-container">

        <div class="ai-window" id="ai-window">
            <div class="ai-window-header">
                <div class="ai-title">
                    <i class="fa-solid fa-robot"></i> 戰情室 AI 助手
                </div>
                <div style="cursor: pointer; opacity: 0.7;" onclick="toggleWidget()">
                    <i class="fa-solid fa-chevron-down"></i>
                </div>
            </div>

            <div id="ai-context-bar" class="ai-context-bar" style="display: none;">
            </div>

            <div class="ai-window-body">
                <div id="ai-content" class="ai-content">
                    AI 正在待命，準備分析系統數據...
                </div>
            </div>

            <div class="ai-footer">
                <div style="font-size:0.8em; color:#666;">建議追蹤項目:</div>
                <div id="ai-tags" class="ai-suggest-tags">
                </div>
                <button id="btn-reanalyze" class="ai-action-btn" onclick="manualTriggerAI()">
                    <i class="fa-solid fa-rotate"></i> 重新分析戰情
                </button>
            </div>
        </div>

        <div class="ai-fab" onclick="toggleWidget()" title="開啟 AI 診斷">
            <div class="ai-fab-icon">🔮</div>
            <div id="ai-status-dot" class="ai-status-indicator"></div>
        </div>

    </div>

    <script>
        // --- 0. 內嵌真實測試數據 (MOCK_SERVER_DATA) ---
        const MOCK_SERVER_DATA = {
            "code": 0,
            "data": {
                "list": [
                    {
                        "host": "104.199.219.254", "alias": "ida 莎普羅 漮華",
                        "pluginOutput": "OK. instance-1 ping time 36.3ms",
                        "serviceList": [
                            { "service": "check_cpu", "pluginOutput": "processor_usage: 64" },
                            { "service": "check_mem", "pluginOutput": "mempool_perc: 98" }
                        ]
                    },
                    {
                        "host": "35.185.128.37", "alias": "康鮮 NISORO",
                        "pluginOutput": "OK. nisoro ping time 36.6ms",
                        "serviceList": [
                            { "service": "check_cpu", "pluginOutput": "processor_usage: 14" },
                            { "service": "check_mem", "pluginOutput": "mempool_perc: 37" }
                        ]
                    },
                    {
                        "host": "https://omo.sunshinelab.com.tw", "alias": "耀陽實驗室網站",
                        "pluginOutput": "Web load time 0.751s code 200"
                    },
                    {
                        "host": "https://omo.sunshinelab.com.tw-ssl", "alias": "耀陽實驗室網站憑證到期",
                        "pluginOutput": "網站憑證到期天數 84 天"
                    },
                    {
                        "host": "https://www.drtsaiclinic.com", "alias": "蔡凱宙網站",
                        "pluginOutput": "code 403"
                    },
                    {
                        "host": "https://www.drtsaiclinic.com-ssl", "alias": "蔡凱宙網站憑證到期",
                        "pluginOutput": "網站憑證到期天數 61 天"
                    },
                    {
                        "host": "https://www.khbio.com.tw", "alias": "漮華藥品網站",
                        "pluginOutput": "code 200 Service Unavailable"
                    },
                    {
                        "host": "https://www.khbio.com.tw-ssl", "alias": "漮華網站憑證到期",
                        "pluginOutput": "網站憑證到期天數 37 天"
                    }
                ]
            }
        };

        // --- 設定與參數 ---
        const AUTO_REFRESH_INTERVAL = 300;
        let hosts = [];
        let activeTags = new Set();
        let countdownVal = AUTO_REFRESH_INTERVAL;

        const issueTypes = {
            "CPU_SATURATION": { label: "🔥 CPU 過載", color: "#FF5252" },
            "MEM_LEAK": { label: "💾 記憶體洩漏", color: "#FFC107" },
            "SSL_EXPIRY": { label: "🔒 憑證過期", color: "#AB47BC" },
            "WEB_ERROR": { label: "🚫 網站錯誤", color: "#FF5252" },
            "HEALTHY": { label: "✅ 系統正常", color: "#4CAF50" }
        };

        // --- 1. 鍊金解析器 ---
        function parseRealData(jsonData) {
            const rawList = jsonData.data.list;
            const adaptedHosts = [];

            rawList.forEach(item => {
                let status = 'OK';
                let issueType = 'HEALTHY';
                let metricLabel = 'OK';
                let alchemyElements = [];

                if (item.serviceList && item.serviceList.length > 0) {
                    let cpuUsage = 0, memUsage = 0;
                    const cpuSvc = item.serviceList.find(s => s.service === 'check_cpu');
                    const memSvc = item.serviceList.find(s => s.service === 'check_mem');

                    if (cpuSvc && cpuSvc.pluginOutput) {
                        const m = cpuSvc.pluginOutput.match(/usage[:\s]+(\d+)/);
                        if (m) cpuUsage = parseInt(m[1]);
                    }
                    if (memSvc && memSvc.pluginOutput) {
                        const m = memSvc.pluginOutput.match(/perc[:\s]+(\d+)/);
                        if (m) memUsage = parseInt(m[1]);
                    }

                    if (memUsage > 90) {
                        status = 'CRIT';
                        issueType = 'MEM_LEAK';
                        metricLabel = `Mem: ${memUsage}%`;
                        alchemyElements = ['💾 Memory', '🔥 High Load'];
                    } else if (cpuUsage > 80) {
                        status = 'WARN';
                        issueType = 'CPU_SATURATION';
                        metricLabel = `CPU: ${cpuUsage}%`;
                        alchemyElements = ['🔥 CPU', '⚙️ Process'];
                    } else {
                        metricLabel = `CPU: ${cpuUsage}%`;
                    }
                }
                else if (item.pluginOutput) {
                    if (item.alias.includes("憑證")) {
                        const dayMatch = item.pluginOutput.match(/天數\s*(\d+)/);
                        if (dayMatch) {
                            const days = parseInt(dayMatch[1]);
                            metricLabel = `SSL: ${days}天`;
                            if (days < 45) {
                                status = 'WARN';
                                issueType = 'SSL_EXPIRY';
                                alchemyElements = ['🔒 Cert', '⏳ Time'];
                            }
                        }
                    } else if (item.pluginOutput.includes("code 403") || item.pluginOutput.includes("code 500")) {
                        status = 'CRIT';
                        issueType = 'WEB_ERROR';
                        const code = item.pluginOutput.match(/code\s*(\d+)/)?.[1] || 'Err';
                        metricLabel = `Http: ${code}`;
                        alchemyElements = ['🌐 Web', '🚫 Forbidden'];
                    } else {
                        metricLabel = 'Http: 200';
                    }
                }

                adaptedHosts.push({
                    id: item.alias || item.host,
                    ip: item.host,
                    status: status,
                    issueType: issueType,
                    metric: metricLabel,
                    elements: alchemyElements
                });
            });
            return adaptedHosts;
        }

        // --- 2. 渲染邏輯 ---
        function animateValue(obj, start, end, duration) {
            if (!obj) return;
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                obj.innerHTML = Math.floor(progress * (end - start) + start);
                if (progress < 1) {
                    window.requestAnimationFrame(step);
                }
            };
            window.requestAnimationFrame(step);
        }

        function renderDashboard() {
            const stats = {
                total: hosts.length,
                crit: hosts.filter(h => h.status === 'CRIT').length,
                warn: hosts.filter(h => h.status === 'WARN').length,
                ok: hosts.filter(h => h.status === 'OK').length
            };

            animateValue(document.getElementById('total-hosts'), 0, stats.total, 800);
            animateValue(document.getElementById('crit-hosts'), 0, stats.crit, 800);
            animateValue(document.getElementById('warn-hosts'), 0, stats.warn, 800);
            animateValue(document.getElementById('ok-hosts'), 0, stats.ok, 800);

            const issueCounts = {};
            hosts.filter(h => h.status !== 'OK').forEach(h => {
                issueCounts[h.issueType] = (issueCounts[h.issueType] || 0) + 1;
            });

            const chartContainer = document.getElementById('issue-chart');
            chartContainer.innerHTML = '';

            const sortedIssues = Object.keys(issueCounts).sort((a, b) => issueCounts[b] - issueCounts[a]);
            const maxCount = sortedIssues.length > 0 ? issueCounts[sortedIssues[0]] : 1;

            if (sortedIssues.length === 0) {
                chartContainer.innerHTML = '<div style="color:#666; text-align:center; padding:30px;">🎉 系統運作於最佳狀態</div>';
            } else {
                sortedIssues.forEach(type => {
                    const count = issueCounts[type];
                    const meta = issueTypes[type];
                    const percent = (count / maxCount) * 100;

                    const row = document.createElement('div');
                    row.className = 'bar-row';
                    row.onclick = () => filterHostList(type);
                    row.innerHTML = `
                        <div class="bar-label" style="color:${meta.color}">
                            <i class="fa-solid fa-circle" style="font-size:0.5em"></i> ${meta.label}
                        </div>
                        <div class="bar-track">
                            <div class="bar-fill" style="width: ${percent}%; background: ${meta.color}"></div>
                        </div>
                        <div class="bar-count">${count}</div>
                    `;
                    chartContainer.appendChild(row);
                });
            }

            renderHostList(hosts);
        }

        function renderHostList(data) {
            const grid = document.getElementById('host-grid');
            grid.innerHTML = '';

            const sortedData = [...data].sort((a, b) => {
                const score = { 'CRIT': 3, 'WARN': 2, 'OK': 1 };
                return score[b.status] - score[a.status];
            });

            sortedData.forEach(h => {
                const card = document.createElement('div');
                card.className = 'host-card';

                let statusClass = 's-ok';
                if (h.status === 'CRIT') statusClass = 's-crit';
                if (h.status === 'WARN') statusClass = 's-warn';

                // 元素標籤
                const elementBadges = h.elements.map(el =>
                    `<span class="element-badge">${el}</span>`
                ).join('');

                card.innerHTML = `
                    <div class="host-header">
                        <div>
                            <div class="host-title">${h.id}</div>
                            <div class="host-ip">${h.ip}</div>
                        </div>
                        <div class="metric-badge ${statusClass}">${h.metric}</div>
                    </div>
                    <div style="font-size:0.8em; color:${issueTypes[h.issueType].color}">
                        <i class="fa-solid fa-wave-square"></i> ${h.issueType !== 'HEALTHY' ? issueTypes[h.issueType].label : '正常'}
                    </div>
                    <div class="host-elements">
                        ${elementBadges}
                    </div>
                `;
                card.onclick = () => {
                    if (h.elements.length > 0) addContextTag(h.elements[0]);
                };
                grid.appendChild(card);
            });
        }

        function filterHostList(issueType) {
            const filtered = hosts.filter(h => h.issueType === issueType);
            renderHostList(filtered);
            const labelEl = document.getElementById('list-filter-label');
            labelEl.innerText = `${issueTypes[issueType].label}`;
            labelEl.style.color = issueTypes[issueType].color;
        }

        // --- 3. Widget UI 控制 ---

        function toggleWidget(forceOpen = false) {
            const windowEl = document.getElementById('ai-window');
            if (forceOpen) {
                windowEl.classList.add('active');
            } else {
                windowEl.classList.toggle('active');
            }
        }

        function updateWidgetStatus(status) {
            const dot = document.getElementById('ai-status-dot');
            dot.className = 'ai-status-indicator';
            if (status === 'busy') dot.classList.add('busy');
            if (status === 'error') dot.classList.add('error');
        }

        // --- 4. 互動上下文邏輯 ---

        function addContextTag(tag) {
            if (activeTags.has(tag)) return;
            activeTags.add(tag);
            renderActiveTags();
            triggerAIAnalysis(true);
        }

        function removeContextTag(tag) {
            activeTags.delete(tag);
            renderActiveTags();
            triggerAIAnalysis(true);
        }

        function renderActiveTags() {
            const container = document.getElementById('ai-context-bar');
            container.innerHTML = '';

            if (activeTags.size === 0) {
                container.style.display = 'none';
                return;
            }

            container.style.display = 'flex';
            // 加入提示文字
            const label = document.createElement('span');
            label.style.cssText = 'font-size:0.8em; color:#aaa; display:flex; align-items:center;';
            label.innerText = '聚焦:';
            container.appendChild(label);

            activeTags.forEach(tag => {
                const el = document.createElement('div');
                el.className = 'context-chip';
                el.innerHTML = `${tag} <span class="context-remove" onclick="removeContextTag('${tag}')">×</span>`;
                container.appendChild(el);
            });
        }

        // --- 5. 真實 AI 分析核心 ---

        async function triggerAIAnalysis(isRefinement = false) {
            const btn = document.getElementById('btn-reanalyze');
            const aiContent = document.getElementById('ai-content');
            const aiTags = document.getElementById('ai-tags');

            // UI 狀態：忙碌中
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> AI 思考中...';
            updateWidgetStatus('busy');

            // 如果是自動觸發或使用者點擊，都確保視窗彈出
            toggleWidget(true);

            // 1. 收集目前的監控數據統計
            const stats = {
                crit: hosts.filter(h => h.status === 'CRIT').length,
                warn: hosts.filter(h => h.status === 'WARN').length,
                issues: {}
            };
            hosts.filter(h => h.status !== 'OK').forEach(h => {
                stats.issues[h.issueType] = (stats.issues[h.issueType] || 0) + 1;
            });

            // 2. 建構專家級 System Prompt
            let prompt = `
你是一位擁有 20 年經驗的資深 SRE (網站可靠性工程師) 與 AIOps 全域監控專家。
請根據以下系統全網遙測數據進行戰情分析：

[系統狀態數據]
- 嚴重告警 (Critical): ${stats.crit} 台
- 警告通知 (Warning): ${stats.warn} 台
- 異常類型分佈: ${JSON.stringify(stats.issues)}
`;

            if (activeTags.size > 0) {
                const focusTopics = Array.from(activeTags).join(', ');
                const relatedHosts = hosts.filter(h =>
                    activeTags.has(h.issueType) || h.elements.some(el => activeTags.has(el))
                ).map(h => `${h.id}(${h.metric})`).join(', ');

                prompt += `
[使用者關注焦點 (User Focus)]
使用者正在針對標籤 [${focusTopics}] 進行深度調查。

[相關佐證數據]
受影響主機: ${relatedHosts || "無特定主機數據"}

[分析任務]
1. **深度關聯分析**: 針對 [${focusTopics}] 進行根因推斷。
2. **具體處置建議**: 提供技術性的緩解或修復步驟。
`;
            } else {
                prompt += `
[分析任務]
1. **戰情總結**: 提供當前系統健康度的戰術摘要。
2. **優先行動**: 建議維運團隊接下來應優先處理的事項。
`;
            }

            prompt += `
[輸出規範]
1. **語言**: 必須使用 **繁體中文 (Traditional Chinese)**。
2. **格式**: 僅輸出純 JSON 字串，严禁 Markdown code block。
3. **欄位**:
   - "result": 短標題
   - "summary": 詳細分析內容 (支援 Markdown 語法如 **粗體**, * 列表)
   - "tags": [關鍵字1, 關鍵字2]
   - "color": 建議顏色Hex
`;

            try {
                const formData = new FormData();
                formData.append('message', prompt);

                const response = await fetch("/api/monitor/analyze", {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) throw new Error("API Request Failed");

                const resJson = await response.json();

                if (resJson.status === 'success') {
                    let rawText = resJson.response;
                    // 清理
                    rawText = rawText.replace(/```json/gi, '').replace(/```/g, '').trim();
                    const jsonMatch = rawText.match(/\{[\s\S]*\}/);

                    if (!jsonMatch) throw new Error("JSON Parse Error");
                    const data = JSON.parse(jsonMatch[0]);

                    // 渲染 Markdown
                    if (typeof marked !== 'undefined') {
                        aiContent.innerHTML = marked.parse(data.summary);
                    } else {
                        aiContent.innerText = data.summary;
                    }

                    // 渲染 Tags
                    aiTags.innerHTML = data.tags.map(tag =>
                        `<div class="tag-btn" onclick="addContextTag('${tag}')">${tag}</div>`
                    ).join('');

                    updateWidgetStatus('idle'); // 回復綠燈
                } else {
                    throw new Error(resJson.message);
                }

            } catch (e) {
                console.error(e);
                aiContent.innerHTML = `<span style="color:#ff5252"><i class="fa-solid fa-circle-exclamation"></i> 分析失敗: ${e.message}</span>`;
                updateWidgetStatus('error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fa-solid fa-rotate"></i> 重新分析戰情';
            }
        }

        // --- 6. 系統啟動 ---
        function manualTriggerAI() {
            countdownVal = AUTO_REFRESH_INTERVAL;
            updateCountdown();
            triggerAIAnalysis();
        }

        function updateCountdown() {
            document.getElementById('countdown').innerText = countdownVal;
        }

        function initSystem() {
            hosts = parseRealData(MOCK_SERVER_DATA);
            renderDashboard();
            triggerAIAnalysis();

            setInterval(() => {
                countdownVal--;
                if (countdownVal <= 0) {
                    countdownVal = AUTO_REFRESH_INTERVAL;
                    // hosts = parseRealData(NEW_DATA); // 真實環境取消註解
                    renderDashboard();
                    triggerAIAnalysis();
                }
                updateCountdown();
            }, 1000);
        }

        window.addEventListener('load', initSystem);

    </script>
