<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天氣監控 - AIOps 智能系統</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body { 
            margin: 0; 
            background: linear-gradient(135deg, #0b1329 0%, #1a233a 50%, #0b1329 100%) !important;
            background-attachment: fixed;
            min-height: 100vh;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            position: relative;
            overflow-x: hidden;
            color: #f1f5f9;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 30%, rgba(0, 174, 255, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(138, 43, 226, 0.08) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }
        .grid-bg {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                linear-gradient(rgba(0, 174, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 174, 255, 0.02) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 0;
        }

        /* --- 頂部導航列 (與 chat.html 同步) --- */
        header {
            background-color: rgba(15, 23, 42, 0.8) !important;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08) !important;
            padding: 15px 25px !important;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        header h1 {
            color: #ffffff;
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            text-shadow: 0 0 10px rgba(59, 130, 246, 0.3);
            margin: 0;
            flex: 0 1 auto !important;
        }
        .nav-links {
            display: flex;
            gap: 8px;
            margin-left: 20px;
            flex: 1;
            flex-wrap: wrap;
        }
        .nav-item {
            color: #94a3b8;
            text-decoration: none;
            font-size: 0.85rem;
            padding: 6px 12px;
            border-radius: 20px;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 6px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            background-color: rgba(255, 255, 255, 0.02);
        }
        .nav-item i {
            font-size: 0.95rem;
        }
        .nav-item:hover {
            color: #60a5fa;
            background: rgba(59, 130, 246, 0.1);
            border-color: rgba(59, 130, 246, 0.25);
            transform: translateY(-1px);
        }
        .nav-item.active {
            color: #ffffff;
            background: linear-gradient(135deg, #1d4ed8 0%, #1e40af 100%);
            border-color: rgba(59, 130, 246, 0.3);
            box-shadow: 0 4px 15px rgba(29, 78, 216, 0.35);
        }

        /* --- 主要內容區 --- */
        .weather-container { 
            max-width: 1200px; 
            margin: 0 auto; 
            padding: 30px 20px; 
            position: relative;
            z-index: 1;
        }
        .page-title {
            color: #fff;
            text-align: center;
            font-size: 2.5rem;
            margin: 10px 0 8px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(135deg, #00aeff 0%, #8a2be2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            position: relative;
            display: inline-block;
            left: 50%;
            transform: translateX(-50%);
        }
        .page-title::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 3px;
            background: linear-gradient(90deg, transparent, #00aeff, #8a2be2, transparent);
            box-shadow: 0 0 10px rgba(0, 174, 255, 0.8);
        }
        .page-subtitle {
            text-align: center;
            color: rgba(255,255,255,0.6);
            margin-bottom: 35px;
            font-size: 0.95rem;
            letter-spacing: 1px;
        }

        /* --- 查詢表單 --- */
        .weather-form { 
            background: rgba(15, 23, 42, 0.55);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 174, 255, 0.15);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 
                0 10px 30px rgba(0, 0, 0, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 20px; 
            margin-bottom: 24px;
            position: relative;
        }
        .weather-form::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(0, 174, 255, 0.4), transparent);
        }
        .weather-form > div {
            display: flex;
            flex-direction: column;
        }
        .weather-form label { 
            font-weight: 600; 
            color: #00aeff;
            margin-bottom: 8px;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }
        .weather-form input { 
            padding: 10px 14px; 
            border: 1px solid rgba(0, 174, 255, 0.25); 
            border-radius: 8px; 
            background: rgba(10, 14, 39, 0.7);
            font-size: 14px;
            transition: all 0.3s ease;
            color: #fff;
        }
        .weather-form input:focus {
            outline: none;
            border-color: #00aeff;
            background: rgba(10, 14, 39, 0.9);
            box-shadow: 0 0 15px rgba(0, 174, 255, 0.25);
        }
        .weather-form button[type="submit"] { 
            grid-column: 1 / -1; 
            padding: 14px 28px; 
            border: 1px solid rgba(0, 174, 255, 0.4); 
            background: linear-gradient(135deg, rgba(0, 174, 255, 0.15) 0%, rgba(138, 43, 226, 0.15) 100%);
            color: #fff; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            position: relative;
            overflow: hidden;
        }
        .weather-form button[type="submit"]:hover {
            background: linear-gradient(135deg, rgba(0, 174, 255, 0.3) 0%, rgba(138, 43, 226, 0.3) 100%);
            border-color: #00aeff;
            box-shadow: 0 0 20px rgba(0, 174, 255, 0.4);
            transform: translateY(-1px);
        }
        .weather-form button[type="submit"]:disabled { 
            opacity: 0.4; 
            cursor: not-allowed;
        }

        /* --- 檢視切換按鈕與控制列 --- */
        .control-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            background: rgba(15, 23, 42, 0.4);
            padding: 12px 20px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
        }
        .view-controls {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .view-controls label {
            font-size: 0.8rem;
            color: #94a3b8;
            font-weight: 600;
        }
        .toggle-buttons {
            display: flex;
            background: rgba(10, 14, 39, 0.6);
            padding: 4px;
            border-radius: 30px;
            border: 1px solid rgba(0, 174, 255, 0.15);
        }
        .toggle-btn {
            background: transparent;
            border: none;
            color: #94a3b8;
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.25s ease;
        }
        .toggle-btn.active {
            color: #fff;
            background: linear-gradient(135deg, #00aeff 0%, #8a2be2 100%);
            box-shadow: 0 2px 10px rgba(0, 174, 255, 0.3);
        }
        .toggle-btn:not(.active):hover {
            color: #60a5fa;
            background: rgba(59, 130, 246, 0.1);
        }

        /* 輪播控制面板 */
        .carousel-controls {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .nav-btn {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(0, 174, 255, 0.3);
            color: #f1f5f9;
            padding: 6px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .nav-btn:hover:not(:disabled) {
            border-color: #00aeff;
            background: rgba(0, 174, 255, 0.15);
            box-shadow: 0 0 10px rgba(0, 174, 255, 0.2);
        }
        .nav-btn:disabled {
            opacity: 0.35;
            cursor: not-allowed;
            border-color: rgba(255, 255, 255, 0.05);
        }
        .nav-info {
            font-size: 0.85rem;
            font-weight: 600;
            color: #00aeff;
            letter-spacing: 1px;
            min-width: 45px;
            text-align: center;
        }

        /* --- 狀態列 --- */
        .status { 
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(20px);
            padding: 12px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: 600;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
            color: #00aeff;
            font-size: 0.85rem;
            border: 1px solid rgba(0, 174, 255, 0.2);
            letter-spacing: 1px;
        }

        /* --- 結果容器 --- */
        .results-wrapper {
            position: relative;
            width: 100%;
            overflow: hidden;
            margin-bottom: 24px;
            border-radius: 16px;
            padding: 4px;
        }

        /* Carousel 檢視模式的容器與卡片 */
        .results.view-carousel { 
            display: flex; 
            flex-wrap: nowrap;
            gap: 0;
            width: 100%;
            transition: none; /* 由 JS 對卡片做 transform */
        }
        .results.view-carousel .location-card { 
            flex: 0 0 100%;
            width: 100%;
            margin-bottom: 0;
            transition: transform 0.45s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        /* Grid 檢視模式的容器與卡片 */
        .results.view-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 20px; 
            width: 100%;
        }
        .results.view-grid .location-card { 
            flex: initial;
            width: auto;
            transform: none !important; /* 強制覆蓋 JS transform */
            transition: all 0.3s ease;
        }

        /* --- 卡片細部樣式 --- */
        .location-card { 
            border: 1px solid rgba(0, 174, 255, 0.15);
            border-radius: 16px; 
            padding: 24px; 
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
        }
        .location-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 174, 255, 0.08), transparent);
            transition: left 0.8s ease;
        }
        .location-card:hover::before {
            left: 100%;
        }
        .location-card:hover {
            border-color: rgba(0, 174, 255, 0.4);
            box-shadow: 0 10px 40px rgba(0, 174, 255, 0.15);
        }
        .location-card h2 { 
            margin: 0 0 20px; 
            background: linear-gradient(135deg, #00aeff 0%, #8a2be2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 1.6rem;
            border-bottom: 2px solid rgba(0, 174, 255, 0.25);
            padding-bottom: 10px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .element-block { 
            margin-bottom: 16px; 
            padding: 14px;
            background: rgba(10, 14, 39, 0.5);
            border-radius: 12px;
            border: 1px solid rgba(0, 174, 255, 0.1);
            transition: all 0.3s ease;
        }
        .element-block:hover {
            background: rgba(10, 14, 39, 0.7);
            border-color: rgba(0, 174, 255, 0.3);
        }
        .element-block h3 { 
            margin: 0 0 12px; 
            font-size: 0.95rem; 
            color: #00aeff;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        .element-block h3::before {
            content: '✦';
            font-size: 0.9rem;
            color: #8a2be2;
        }

        /* --- 天氣時間段細項 --- */
        .time-entry { 
            padding: 12px 14px; 
            border-left: 3px solid #00aeff;
            background: rgba(0, 174, 255, 0.04);
            margin-bottom: 8px; 
            border-radius: 6px;
            transition: all 0.25s ease;
            color: rgba(255, 255, 255, 0.9);
            font-size: 0.85rem;
            line-height: 1.6;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        .time-entry:hover {
            border-left-width: 5px;
            background: rgba(0, 174, 255, 0.08);
            box-shadow: 0 4px 15px rgba(0, 174, 255, 0.15);
            transform: translateX(2px);
        }
        .time-entry:last-child { margin-bottom: 0; }

        /* --- 視覺化氣象資訊 --- */
        .weather-info-wrapper {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 6px;
            padding-top: 6px;
            border-top: 1px dashed rgba(255, 255, 255, 0.08);
        }
        .weather-value-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .weather-icon {
            font-size: 1.1rem;
            width: 24px;
            text-align: center;
        }
        .icon-sun { color: #f59e0b; filter: drop-shadow(0 0 4px rgba(245, 158, 11, 0.5)); }
        .icon-cloud { color: #94a3b8; }
        .icon-rain { color: #3b82f6; filter: drop-shadow(0 0 4px rgba(59, 130, 246, 0.5)); }
        .icon-thunder { color: #eab308; filter: drop-shadow(0 0 6px rgba(234, 179, 8, 0.6)); }
        .icon-pop { color: #06b6d4; }
        .icon-temp-low { color: #60a5fa; }
        .icon-temp-high { color: #f87171; }

        .time-label {
            font-size: 0.75rem;
            color: #64748b;
            display: block;
            margin-bottom: 4px;
        }
        .value-text {
            font-weight: 600;
            color: #fff;
        }

        /* 降雨機率進度條 */
        .pop-container {
            width: 100%;
            margin-top: 6px;
        }
        .pop-progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            overflow: hidden;
            margin-top: 4px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }
        .pop-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #3b82f6, #06b6d4);
            border-radius: 10px;
            transition: width 0.8s ease;
        }

        /* --- 原始 JSON 回應 --- */
        .raw-json { 
            margin-top: 28px;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(20px);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(0, 174, 255, 0.15);
        }
        .raw-json h2 {
            margin: 0 0 16px;
            background: linear-gradient(135deg, #00aeff 0%, #8a2be2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .raw-json h2::before {
            content: '{ }';
            font-size: 1rem;
            color: #00aeff;
        }
        pre { 
            background: rgba(10, 14, 39, 0.85);
            color: #00ff88; 
            padding: 16px; 
            border-radius: 8px; 
            overflow-x: auto;
            box-shadow: inset 0 0 15px rgba(0, 0, 0, 0.6);
            font-size: 12px;
            line-height: 1.6;
            font-family: 'Fira Code', 'Consolas', 'Monaco', monospace;
            border: 1px solid rgba(0, 174, 255, 0.1);
        }

        /* --- 響應式優化 --- */
        @media (max-width: 900px) {
            .weather-form { 
                grid-template-columns: repeat(2, 1fr);
            }
        }
        @media (max-width: 600px) {
            .weather-form { 
                grid-template-columns: 1fr; 
                padding: 16px;
            }
            .control-row {
                flex-direction: column;
                gap: 12px;
                align-items: stretch;
            }
            .carousel-controls {
                justify-content: space-between;
            }
            .page-title { font-size: 1.8rem; }
        }
    </style>
</head>
<body>
<div class="grid-bg"></div>

<!-- 頂部導航列 (全站 Dashboard 整合) -->
<header>
    <h1>AIOps 智能系統</h1>
    <div class="nav-links">
        <a href="/chat" class="nav-item"><i class="fas fa-comments"></i> 智能對話</a>
        <a href="/future" class="nav-item"><i class="fas fa-robot"></i> AIOps 監控中心</a>
        <a href="/dashboard" class="nav-item"><i class="fas fa-tachometer-alt"></i> 儀表板</a>
        <a href="/monitor" class="nav-item"><i class="fas fa-server"></i> 系統監控</a>
        <a href="/mt" class="nav-item"><i class="fas fa-network-wired"></i> 拓樸圖</a>
        <a href="/infinite" class="nav-item"><i class="fas fa-flask"></i> 鍊金術</a>
        <a href="/weather" class="nav-item active"><i class="fas fa-cloud-sun"></i> 天氣監控</a>
    </div>
</header>

<div class="weather-container">
    <h2 class="page-title">中央氣象署預報監控</h2>
    <p class="page-subtitle">調用開放氣象 API，即時監看區域氣象與降雨預報</p>

    <!-- 查詢參數設定 -->
    <form id="forecastForm" class="weather-form">
        <div>
            <label for="timeFrom">開始時間</label>
            <input type="datetime-local" id="timeFrom" name="timeFrom">
        </div>
        <div>
            <label for="timeTo">結束時間</label>
            <input type="datetime-local" id="timeTo" name="timeTo">
        </div>
        <div>
            <label for="locationName">地區 (例如：臺北市)</label>
            <input type="text" id="locationName" name="locationName" placeholder="選填，預設為全部">
        </div>
        <div>
            <label for="elementName">氣象要素</label>
            <input type="text" id="elementName" name="elementName" placeholder="Wx, PoP, MinT, MaxT (選填)">
        </div>
        <div>
            <label for="limit">回傳地區筆數</label>
            <input type="number" id="limit" name="limit" min="1" value="10">
        </div>
        <div>
            <label for="offset">頁面偏移</label>
            <input type="number" id="offset" name="offset" min="1" value="1">
        </div>
        <button type="submit"><i class="fas fa-search"></i> 執行氣象預報查詢</button>
    </form>

    <!-- 檢視切換與輪播控制器 -->
    <div class="control-row">
        <!-- 檢視模式 Toggle -->
        <div class="view-controls">
            <label>檢視模式：</label>
            <div class="toggle-buttons">
                <button type="button" id="btnCarouselMode" class="toggle-btn active" data-mode="carousel">
                    <i class="fas fa-clone"></i> 卡片輪播
                </button>
                <button type="button" id="btnGridMode" class="toggle-btn" data-mode="grid">
                    <i class="fas fa-th-large"></i> 響應式網格
                </button>
            </div>
        </div>

        <!-- 輪播控制器 (僅在卡片模式下顯示) -->
        <div class="carousel-controls" id="carouselControls">
            <button id="prevBtn" class="nav-btn" type="button"><i class="fas fa-chevron-left"></i></button>
            <span id="navInfo" class="nav-info">- / -</span>
            <button id="nextBtn" class="nav-btn" type="button"><i class="fas fa-chevron-right"></i></button>
        </div>
    </div>

    <!-- 查詢狀態 -->
    <div id="status" class="status">尚未進行查詢</div>

    <!-- 卡片與網格資料容器 -->
    <div class="results-wrapper">
        <div id="results" class="results view-carousel"></div>
    </div>

    <!-- 原始回應 JSON 區 -->
    <div class="raw-json">
        <h2>原始 REST 回應內容</h2>
        <pre id="rawJson">等待查詢觸發...</pre>
    </div>
</div>

<script src="/js/weather.js"></script>
</body>
</html>
